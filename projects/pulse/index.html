<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulse — Server Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #04040d;
      --bg2:     #080818;
      --panel:   rgba(255,255,255,0.03);
      --border:  rgba(255,255,255,0.08);
      --text:    #e2e8f0;
      --muted:   #64748b;
      --green:   #22d3a5;
      --yellow:  #f59e0b;
      --red:     #f43f5e;
      --violet:  #7c3aed;
      --cyan:    #06b6d4;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      overflow-x: hidden;
      cursor: none;
    }

    /* ── CURSOR ── */
    #cursor {
      width: 10px; height: 10px;
      background: var(--cyan); border-radius: 50%;
      position: fixed; top: 0; left: 0;
      pointer-events: none; z-index: 9999;
      box-shadow: 0 0 14px var(--cyan);
      transition: transform .1s;
    }
    #cursor-ring {
      width: 34px; height: 34px;
      border: 1px solid rgba(6,182,212,.4);
      border-radius: 50%;
      position: fixed; top: 0; left: 0;
      pointer-events: none; z-index: 9998;
    }

    /* ── LAYOUT ── */
    .topbar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 28px;
      border-bottom: 1px solid var(--border);
      background: rgba(4,4,13,.9);
      backdrop-filter: blur(20px);
      position: sticky; top: 0; z-index: 10;
    }
    .topbar-left {
      display: flex; align-items: center; gap: 14px;
    }
    .logo {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.1rem; font-weight: 700;
      color: var(--cyan); letter-spacing: -.5px;
    }
    .logo em { color: var(--violet); font-style: normal; }
    .live-badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: .7rem; letter-spacing: .1em;
      color: var(--green);
      background: rgba(34,211,165,.08);
      border: 1px solid rgba(34,211,165,.25);
      padding: 4px 12px; border-radius: 100px;
    }
    .live-badge::before {
      content: '●'; font-size: .4rem;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    .topbar-right {
      display: flex; align-items: center; gap: 16px;
    }
    .time-display {
      font-family: 'JetBrains Mono', monospace;
      font-size: .8rem; color: var(--muted);
    }
    .back-link {
      font-family: 'JetBrains Mono', monospace;
      font-size: .75rem; color: var(--muted);
      text-decoration: none; display: flex; align-items: center; gap: 6px;
      transition: color .2s;
    }
    .back-link:hover { color: var(--cyan); }

    .main {
      display: grid;
      grid-template-columns: 260px 1fr;
      height: calc(100vh - 57px);
    }

    /* ── SIDEBAR ── */
    .sidebar {
      border-right: 1px solid var(--border);
      overflow-y: auto; padding: 20px 0;
    }
    .sidebar-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: .65rem; letter-spacing: .18em;
      color: var(--muted); text-transform: uppercase;
      padding: 0 20px; margin-bottom: 10px;
    }
    .server-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 20px; cursor: none;
      transition: background .2s;
      border-left: 2px solid transparent;
      position: relative;
    }
    .server-item:hover { background: rgba(255,255,255,.03); }
    .server-item.active {
      background: rgba(6,182,212,.06);
      border-left-color: var(--cyan);
    }
    .server-dot {
      width: 8px; height: 8px; border-radius: 50%;
      flex-shrink: 0;
    }
    .server-dot.ok     { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse-dot 2s ease-in-out infinite; }
    .server-dot.warn   { background: var(--yellow); box-shadow: 0 0 8px var(--yellow); }
    .server-dot.crit   { background: var(--red); box-shadow: 0 0 8px var(--red); animation: pulse-dot .6s ease-in-out infinite; }
    @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:.4} }

    .server-info { flex: 1; min-width: 0; }
    .server-name { font-size: .88rem; font-weight: 600; }
    .server-addr { font-family: 'JetBrains Mono', monospace; font-size: .7rem; color: var(--muted); }
    .server-cpu-mini {
      font-family: 'JetBrains Mono', monospace;
      font-size: .7rem; color: var(--muted);
    }

    /* ── CONTENT ── */
    .content { overflow-y: auto; padding: 28px; }

    .server-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 28px;
    }
    .server-title { font-size: 1.4rem; font-weight: 700; letter-spacing: -.5px; }
    .server-meta { font-family: 'JetBrains Mono', monospace; font-size: .78rem; color: var(--muted); margin-top: 4px; }
    .status-pill {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: 'JetBrains Mono', monospace; font-size: .75rem;
      padding: 6px 14px; border-radius: 100px;
      font-weight: 600;
    }
    .status-pill.ok   { color: var(--green); background: rgba(34,211,165,.1); border: 1px solid rgba(34,211,165,.3); }
    .status-pill.warn { color: var(--yellow); background: rgba(245,158,11,.1); border: 1px solid rgba(245,158,11,.3); }
    .status-pill.crit { color: var(--red);    background: rgba(244,63,94,.1);  border: 1px solid rgba(244,63,94,.3); }

    /* ── METRIC CARDS ── */
    .metric-grid {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 14px; margin-bottom: 28px;
    }
    .metric-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px; padding: 20px;
      transition: all .3s;
    }
    .metric-card:hover { border-color: rgba(6,182,212,.25); transform: translateY(-2px); }
    .metric-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: .68rem; letter-spacing: .12em;
      color: var(--muted); text-transform: uppercase;
      margin-bottom: 8px;
    }
    .metric-value {
      font-size: 1.8rem; font-weight: 700; line-height: 1;
      margin-bottom: 10px;
    }
    .metric-value.green  { color: var(--green); }
    .metric-value.yellow { color: var(--yellow); }
    .metric-value.red    { color: var(--red); }
    .metric-value.cyan   { color: var(--cyan); }
    .metric-value.violet { color: var(--violet); }
    .metric-bar-track {
      height: 3px; background: rgba(255,255,255,.06);
      border-radius: 100px; overflow: hidden;
    }
    .metric-bar-fill {
      height: 100%; border-radius: 100px;
      transition: width 1s cubic-bezier(.23,1,.32,1);
    }

    /* ── CHARTS ── */
    .charts-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 16px; margin-bottom: 16px;
    }
    .chart-panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px; padding: 20px;
    }
    .chart-title {
      font-size: .82rem; font-weight: 600;
      margin-bottom: 4px;
    }
    .chart-subtitle {
      font-family: 'JetBrains Mono', monospace;
      font-size: .68rem; color: var(--muted);
      margin-bottom: 14px;
    }
    canvas.sparkline { width: 100%; height: 80px; display: block; }

    /* ── LOG PANEL ── */
    .log-panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px; padding: 20px;
    }
    .log-title { font-size: .82rem; font-weight: 600; margin-bottom: 16px; }
    .log-entries { display: flex; flex-direction: column; gap: 8px; }
    .log-entry {
      display: flex; align-items: baseline; gap: 12px;
      font-family: 'JetBrains Mono', monospace; font-size: .75rem;
      opacity: 0; transform: translateY(-6px);
      animation: log-in .3s forwards;
    }
    @keyframes log-in { to { opacity: 1; transform: none; } }
    .log-time { color: var(--muted); flex-shrink: 0; }
    .log-level { flex-shrink: 0; font-weight: 700; }
    .log-level.INFO  { color: var(--cyan); }
    .log-level.WARN  { color: var(--yellow); }
    .log-level.ERROR { color: var(--red); }
    .log-level.OK    { color: var(--green); }
    .log-msg { color: var(--muted); }

    /* ── GLOBAL OVERVIEW (top row) ── */
    .overview-bar {
      display: grid; grid-template-columns: repeat(4,1fr);
      gap: 12px; margin-bottom: 28px;
    }
    .ov-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px; padding: 16px 18px;
      display: flex; align-items: center; gap: 14px;
    }
    .ov-icon {
      width: 38px; height: 38px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; flex-shrink: 0;
    }
    .ov-icon.g { background: rgba(34,211,165,.12); }
    .ov-icon.y { background: rgba(245,158,11,.12); }
    .ov-icon.r { background: rgba(244,63,94,.12); }
    .ov-icon.c { background: rgba(6,182,212,.12); }
    .ov-val { font-size: 1.4rem; font-weight: 700; line-height: 1; }
    .ov-lbl { font-size: .75rem; color: var(--muted); margin-top: 2px; }

    @media (max-width: 900px) {
      .main { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .metric-grid { grid-template-columns: 1fr 1fr; }
      .charts-grid { grid-template-columns: 1fr; }
      .overview-bar { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<div id="cursor"></div>
<div id="cursor-ring"></div>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo">pulse<em>.</em>monitor</div>
    <div class="live-badge">live</div>
  </div>
  <div class="topbar-right">
    <div class="time-display" id="clock"></div>
    <a href="../../index.html" class="back-link">← back to portfolio</a>
  </div>
</div>

<div class="main">
  <aside class="sidebar">
    <div class="sidebar-label">servers</div>
    <div id="server-list"></div>
  </aside>

  <div class="content" id="content">
    <!-- filled by JS -->
  </div>
</div>

<script>
// ── CURSOR ──────────────────────────────────────────────────────────────────
const cur  = document.getElementById('cursor');
const ring = document.getElementById('cursor-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove', e => {
  mx=e.clientX; my=e.clientY;
  cur.style.left=(mx-5)+'px'; cur.style.top=(my-5)+'px';
});
(function ar(){rx+=(mx-rx-17)*.14;ry+=(my-ry-17)*.14;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(ar);})();

// ── CLOCK ────────────────────────────────────────────────────────────────────
function updateClock() {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-GB', {hour12:false});
}
updateClock(); setInterval(updateClock, 1000);

// ── SERVER DATA ──────────────────────────────────────────────────────────────
const SERVERS = [
  { id: 0, name: 'prod-api-01',  addr: '10.0.1.10', region: 'eu-west-1', os: 'Ubuntu 22.04', uptime: '47d 3h' },
  { id: 1, name: 'prod-api-02',  addr: '10.0.1.11', region: 'eu-west-1', os: 'Ubuntu 22.04', uptime: '47d 3h' },
  { id: 2, name: 'prod-db-01',   addr: '10.0.2.10', region: 'eu-west-1', os: 'Debian 12',    uptime: '120d 14h' },
  { id: 3, name: 'worker-01',    addr: '10.0.3.10', region: 'eu-central-1', os: 'Alpine 3.18', uptime: '12d 6h' },
];

// Per-server state
const state = SERVERS.map((s, i) => ({
  cpu:    40 + i*8 + Math.random()*10,
  mem:    50 + i*5 + Math.random()*10,
  rps:    120 + i*30 + Math.random()*20,
  lat:    18  + i*4  + Math.random()*5,
  cpuHistory: Array.from({length:40}, () => 30+Math.random()*30+i*8),
  memHistory: Array.from({length:40}, () => 45+Math.random()*20+i*5),
  rpsHistory: Array.from({length:40}, () => 100+Math.random()*60+i*20),
  latHistory: Array.from({length:40}, () => 12+Math.random()*14+i*4),
}));

// Inject one server with high CPU to make it interesting
state[2].cpu = 88; state[2].cpuHistory = state[2].cpuHistory.map(()=>78+Math.random()*15);

let selected = 0;

function statusOf(s) {
  if (s.cpu > 85 || s.mem > 90) return 'crit';
  if (s.cpu > 70 || s.mem > 75) return 'warn';
  return 'ok';
}

const statusLabel = { ok:'Healthy', warn:'Warning', crit:'Critical' };

// ── LOG MESSAGES ─────────────────────────────────────────────────────────────
const LOG_POOL = [
  { level:'INFO',  msgs:['GET /api/v1/users 200 12ms','POST /api/v1/auth 200 34ms','Health check passed','Metrics flushed to collector'] },
  { level:'WARN',  msgs:['High memory pressure detected','Slow query: 340ms on users table','Connection pool at 80%','Cache miss rate elevated'] },
  { level:'ERROR', msgs:['Connection timeout to db-replica','Failed to parse request body','Rate limit exceeded for 192.168.1.4'] },
  { level:'OK',    msgs:['Deployment completed successfully','SSL certificate renewed','Backup completed in 2.3s'] },
];
let logs = [];

function randomLog(serverId) {
  const s = state[serverId];
  const status = statusOf(s);
  let pool = LOG_POOL[0].msgs.map(m=>({level:'INFO',msg:m}));
  if (status === 'warn' || status === 'crit') pool.push(...LOG_POOL[1].msgs.map(m=>({level:'WARN',msg:m})));
  if (status === 'crit') pool.push(...LOG_POOL[2].msgs.map(m=>({level:'ERROR',msg:m})));
  else pool.push(...LOG_POOL[3].msgs.map(m=>({level:'OK',msg:m})));
  return pool[Math.floor(Math.random()*pool.length)];
}

function nowStr() {
  return new Date().toLocaleTimeString('en-GB',{hour12:false});
}

// ── RENDER SIDEBAR ───────────────────────────────────────────────────────────
function renderSidebar() {
  const list = document.getElementById('server-list');
  list.innerHTML = SERVERS.map((s,i) => {
    const st = statusOf(state[i]);
    return `<div class="server-item${i===selected?' active':''}" data-id="${i}">
      <div class="server-dot ${st}"></div>
      <div class="server-info">
        <div class="server-name">${s.name}</div>
        <div class="server-addr">${s.addr}</div>
      </div>
      <div class="server-cpu-mini">${Math.round(state[i].cpu)}%</div>
    </div>`;
  }).join('');
  list.querySelectorAll('.server-item').forEach(el => {
    el.addEventListener('click', () => { selected = +el.dataset.id; render(); });
  });
}

// ── SPARKLINE ────────────────────────────────────────────────────────────────
function drawSparkline(canvas, data, color, fillColor) {
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.offsetWidth, H = canvas.offsetHeight;
  canvas.width  = W * dpr; canvas.height = H * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const max = Math.max(...data, 100);
  const min = Math.min(...data, 0);
  const range = max - min || 1;
  const pts = data.map((v,i) => [i/(data.length-1)*W, H - ((v-min)/range)*(H-10) - 5]);

  // fill
  ctx.beginPath();
  ctx.moveTo(pts[0][0], H);
  pts.forEach(([x,y]) => ctx.lineTo(x,y));
  ctx.lineTo(pts[pts.length-1][0], H);
  ctx.closePath();
  const grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0, fillColor);
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.fill();

  // line
  ctx.beginPath();
  pts.forEach(([x,y],i) => i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y));
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.lineJoin = 'round';
  ctx.stroke();

  // last dot
  const [lx,ly] = pts[pts.length-1];
  ctx.beginPath(); ctx.arc(lx,ly,3,0,Math.PI*2);
  ctx.fillStyle = color; ctx.fill();
}

// ── OVERVIEW BAR ─────────────────────────────────────────────────────────────
function overviewHTML() {
  const healthy  = SERVERS.filter((_,i)=>statusOf(state[i])==='ok').length;
  const warnings = SERVERS.filter((_,i)=>statusOf(state[i])==='warn').length;
  const critical = SERVERS.filter((_,i)=>statusOf(state[i])==='crit').length;
  const totalRPS = Math.round(state.reduce((a,s)=>a+s.rps,0));
  return `<div class="overview-bar">
    <div class="ov-card"><div class="ov-icon g">✓</div><div><div class="ov-val" style="color:var(--green)">${healthy}</div><div class="ov-lbl">Healthy servers</div></div></div>
    <div class="ov-card"><div class="ov-icon y">⚠</div><div><div class="ov-val" style="color:var(--yellow)">${warnings}</div><div class="ov-lbl">Warnings</div></div></div>
    <div class="ov-card"><div class="ov-icon r">✕</div><div><div class="ov-val" style="color:var(--red)">${critical}</div><div class="ov-lbl">Critical</div></div></div>
    <div class="ov-card"><div class="ov-icon c">↗</div><div><div class="ov-val" style="color:var(--cyan)">${totalRPS}</div><div class="ov-lbl">Total req/s</div></div></div>
  </div>`;
}

// ── METRIC COLOR ─────────────────────────────────────────────────────────────
function cpuColor(v)  { return v>85?'red':v>70?'yellow':'green'; }
function memColor(v)  { return v>90?'red':v>75?'yellow':'cyan'; }
function latColor(v)  { return v>80?'red':v>40?'yellow':'green'; }

// ── BAR FILL COLOR ───────────────────────────────────────────────────────────
function barGrad(color) {
  const map = { green:'var(--green)', yellow:'var(--yellow)', red:'var(--red)', cyan:'var(--cyan)', violet:'var(--violet)' };
  return map[color];
}

// ── MAIN RENDER ──────────────────────────────────────────────────────────────
function render() {
  const s   = state[selected];
  const srv = SERVERS[selected];
  const st  = statusOf(s);

  const cc = cpuColor(s.cpu), mc = memColor(s.mem), lc = latColor(s.lat);

  document.getElementById('content').innerHTML = `
    ${overviewHTML()}

    <div class="server-header">
      <div>
        <div class="server-title">${srv.name}</div>
        <div class="server-meta">${srv.addr} · ${srv.region} · ${srv.os} · up ${srv.uptime}</div>
      </div>
      <div class="status-pill ${st}">${statusLabel[st]}</div>
    </div>

    <div class="metric-grid">
      <div class="metric-card">
        <div class="metric-label">CPU Usage</div>
        <div class="metric-value ${cc}" id="val-cpu">${Math.round(s.cpu)}%</div>
        <div class="metric-bar-track"><div class="metric-bar-fill" id="bar-cpu" style="width:${s.cpu}%;background:${barGrad(cc)}"></div></div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Memory</div>
        <div class="metric-value ${mc}" id="val-mem">${Math.round(s.mem)}%</div>
        <div class="metric-bar-track"><div class="metric-bar-fill" id="bar-mem" style="width:${s.mem}%;background:${barGrad(mc)}"></div></div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Requests / s</div>
        <div class="metric-value cyan" id="val-rps">${Math.round(s.rps)}</div>
        <div class="metric-bar-track"><div class="metric-bar-fill" id="bar-rps" style="width:${Math.min(s.rps/3,100)}%;background:var(--cyan)"></div></div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Avg Latency</div>
        <div class="metric-value ${lc}" id="val-lat">${Math.round(s.lat)}ms</div>
        <div class="metric-bar-track"><div class="metric-bar-fill" id="bar-lat" style="width:${Math.min(s.lat,100)}%;background:${barGrad(lc)}"></div></div>
      </div>
    </div>

    <div class="charts-grid">
      <div class="chart-panel">
        <div class="chart-title">CPU Usage</div>
        <div class="chart-subtitle">Last 40 samples</div>
        <canvas class="sparkline" id="chart-cpu" height="80"></canvas>
      </div>
      <div class="chart-panel">
        <div class="chart-title">Memory Usage</div>
        <div class="chart-subtitle">Last 40 samples</div>
        <canvas class="sparkline" id="chart-mem" height="80"></canvas>
      </div>
      <div class="chart-panel">
        <div class="chart-title">Requests / sec</div>
        <div class="chart-subtitle">Incoming traffic</div>
        <canvas class="sparkline" id="chart-rps" height="80"></canvas>
      </div>
      <div class="chart-panel">
        <div class="chart-title">Avg Latency (ms)</div>
        <div class="chart-subtitle">Response time</div>
        <canvas class="sparkline" id="chart-lat" height="80"></canvas>
      </div>
    </div>

    <div class="log-panel">
      <div class="log-title">Live Logs — ${srv.name}</div>
      <div class="log-entries" id="log-entries">
        ${logs.map(l=>`<div class="log-entry">
          <span class="log-time">${l.time}</span>
          <span class="log-level ${l.level}">${l.level}</span>
          <span class="log-msg">${l.msg}</span>
        </div>`).join('')}
      </div>
    </div>
  `;

  // Draw sparklines after DOM insertion
  requestAnimationFrame(() => {
    drawSparkline(document.getElementById('chart-cpu'), s.cpuHistory,  '#22d3a5', 'rgba(34,211,165,.12)');
    drawSparkline(document.getElementById('chart-mem'), s.memHistory,  '#06b6d4', 'rgba(6,182,212,.12)');
    drawSparkline(document.getElementById('chart-rps'), s.rpsHistory,  '#7c3aed', 'rgba(124,58,237,.12)');
    drawSparkline(document.getElementById('chart-lat'), s.latHistory,  '#f59e0b', 'rgba(245,158,11,.12)');
  });

  renderSidebar();
}

// ── TICK: update state ────────────────────────────────────────────────────────
function tick() {
  state.forEach((s, i) => {
    // Smooth random walk
    s.cpu = Math.max(2,  Math.min(99, s.cpu + (Math.random()-0.48)*4));
    s.mem = Math.max(10, Math.min(98, s.mem + (Math.random()-0.49)*2));
    s.rps = Math.max(5,  Math.min(400,s.rps + (Math.random()-0.5)*15));
    s.lat = Math.max(1,  Math.min(150,s.lat + (Math.random()-0.5)*4));

    s.cpuHistory.push(s.cpu); if(s.cpuHistory.length>40) s.cpuHistory.shift();
    s.memHistory.push(s.mem); if(s.memHistory.length>40) s.memHistory.shift();
    s.rpsHistory.push(s.rps); if(s.rpsHistory.length>40) s.rpsHistory.shift();
    s.latHistory.push(s.lat); if(s.latHistory.length>40) s.latHistory.shift();
  });

  // Add log entry occasionally
  if (Math.random() < 0.6) {
    const l = randomLog(selected);
    logs.unshift({ time: nowStr(), ...l });
    if (logs.length > 8) logs.pop();
  }

  // Soft update metrics without full re-render
  const s = state[selected];
  const cc = cpuColor(s.cpu), mc = memColor(s.mem), lc = latColor(s.lat);

  const vCpu = document.getElementById('val-cpu');
  const vMem = document.getElementById('val-mem');
  const vRps = document.getElementById('val-rps');
  const vLat = document.getElementById('val-lat');
  if (!vCpu) { render(); return; }

  vCpu.textContent = Math.round(s.cpu)+'%'; vCpu.className='metric-value '+cc;
  vMem.textContent = Math.round(s.mem)+'%'; vMem.className='metric-value '+mc;
  vRps.textContent = Math.round(s.rps);
  vLat.textContent = Math.round(s.lat)+'ms'; vLat.className='metric-value '+lc;

  document.getElementById('bar-cpu').style.width=s.cpu+'%'; document.getElementById('bar-cpu').style.background=barGrad(cc);
  document.getElementById('bar-mem').style.width=s.mem+'%'; document.getElementById('bar-mem').style.background=barGrad(mc);
  document.getElementById('bar-rps').style.width=Math.min(s.rps/3,100)+'%';
  document.getElementById('bar-lat').style.width=Math.min(s.lat,100)+'%'; document.getElementById('bar-lat').style.background=barGrad(lc);

  // Redraw charts
  drawSparkline(document.getElementById('chart-cpu'), s.cpuHistory,  '#22d3a5', 'rgba(34,211,165,.12)');
  drawSparkline(document.getElementById('chart-mem'), s.memHistory,  '#06b6d4', 'rgba(6,182,212,.12)');
  drawSparkline(document.getElementById('chart-rps'), s.rpsHistory,  '#7c3aed', 'rgba(124,58,237,.12)');
  drawSparkline(document.getElementById('chart-lat'), s.latHistory,  '#f59e0b', 'rgba(245,158,11,.12)');

  // Update log panel
  const logEl = document.getElementById('log-entries');
  if (logEl) {
    logEl.innerHTML = logs.map(l=>`<div class="log-entry">
      <span class="log-time">${l.time}</span>
      <span class="log-level ${l.level}">${l.level}</span>
      <span class="log-msg">${l.msg}</span>
    </div>`).join('');
  }

  // Update status pill
  const srv = SERVERS[selected];
  const st = statusOf(s);
  const pill = document.querySelector('.status-pill');
  if (pill) { pill.className=`status-pill ${st}`; pill.textContent=statusLabel[st]; }

  // Update overview bar
  const healthy  = SERVERS.filter((_,i)=>statusOf(state[i])==='ok').length;
  const warnings = SERVERS.filter((_,i)=>statusOf(state[i])==='warn').length;
  const critical = SERVERS.filter((_,i)=>statusOf(state[i])==='crit').length;
  const totalRPS = Math.round(state.reduce((a,s)=>a+s.rps,0));
  const ovVals = document.querySelectorAll('.ov-val');
  if (ovVals.length===4) {
    ovVals[0].textContent=healthy; ovVals[1].textContent=warnings;
    ovVals[2].textContent=critical; ovVals[3].textContent=totalRPS;
  }

  renderSidebar();
}

// ── BOOT ─────────────────────────────────────────────────────────────────────
// Seed some initial logs
for (let i=0;i<5;i++) {
  const l = randomLog(selected);
  logs.push({ time: nowStr(), ...l });
}

render();
setInterval(tick, 1200);
</script>
</body>
</html>
