<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BREACH — Hacking Simulator</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #050508;
      --green:   #00e5a0;
      --green2:  #00ff88;
      --dim:     #2a6a52;
      --muted:   #3a7a62;
      --red:     #ff4466;
      --yellow:  #ffcc00;
      --blue:    #44aaff;
      --purple:  #aa66ff;
      --white:   #c8ffc8;
    }

    html, body { height: 100%; background: var(--bg); overflow: hidden; }

    body {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      color: var(--white);
      cursor: text;
    }

    /* CRT scanlines */
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 100;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        rgba(0,0,0,0) 0px,
        rgba(0,0,0,0) 2px,
        rgba(0,0,0,.08) 2px,
        rgba(0,0,0,.08) 4px
      );
    }

    /* CRT flicker */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 99;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,.4) 100%);
    }

    #terminal {
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 0;
      position: relative;
      z-index: 1;
    }

    /* Header bar */
    #topbar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 16px;
      border-bottom: 1px solid rgba(0,229,160,.15);
      background: rgba(0,229,160,.03);
      flex-shrink: 0;
    }
    #topbar-title { color: var(--green); font-size: .75rem; letter-spacing: .2em; }
    #topbar-right { display: flex; align-items: center; gap: 20px; }
    #objective-display { font-size: .7rem; color: var(--dim); }
    #objective-display span { color: var(--yellow); }
    .back-btn {
      font-size: .7rem; color: var(--dim); text-decoration: none;
      letter-spacing: .05em; transition: color .2s;
    }
    .back-btn:hover { color: var(--green); }

    /* Output area */
    #output {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      line-height: 1.7;
      scroll-behavior: smooth;
    }
    #output::-webkit-scrollbar { width: 4px; }
    #output::-webkit-scrollbar-track { background: transparent; }
    #output::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

    .line { white-space: pre-wrap; word-break: break-all; }
    .line.cmd    { color: var(--green); }
    .line.output { color: var(--white); }
    .line.dim    { color: var(--muted); }
    .line.error  { color: var(--red); }
    .line.warn   { color: var(--yellow); }
    .line.info   { color: var(--blue); }
    .line.success{ color: var(--green2); }
    .line.purple { color: var(--purple); }
    .line.blank  { color: transparent; user-select: none; }
    .line.ascii  { color: var(--green); line-height: 1.2; }

    /* Prompt / input line */
    #input-wrap {
      display: flex; align-items: center;
      padding: 10px 16px;
      border-top: 1px solid rgba(0,229,160,.12);
      background: rgba(0,229,160,.02);
      flex-shrink: 0;
      gap: 0;
    }
    #prompt-label {
      color: var(--green);
      white-space: nowrap;
      flex-shrink: 0;
    }
    #prompt-label .at   { color: var(--dim); }
    #prompt-label .host { color: var(--green2); }
    #prompt-label .path { color: var(--blue); }
    #prompt-label .sep  { color: var(--dim); }

    #cmd-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--white);
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      caret-color: var(--green);
      margin-left: 4px;
    }

    /* Progress bar */
    .progress-line { color: var(--green); }

    /* Blink animation */
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .blink { animation: blink 1s step-end infinite; }

    /* Win screen overlay */
    #win-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,.92);
      flex-direction: column; align-items: center; justify-content: center;
      text-align: center;
      gap: 16px;
      animation: win-fade .5s ease;
    }
    #win-overlay.show { display: flex; }
    @keyframes win-fade { from{opacity:0} to{opacity:1} }
    #win-ascii { color: var(--green2); line-height: 1.1; font-size: 13px; white-space: pre; }
    #win-text { color: var(--white); font-size: .85rem; line-height: 1.8; max-width: 500px; }
    #win-text strong { color: var(--green); }
    .win-btn {
      display: inline-block;
      padding: 10px 24px; border-radius: 6px;
      background: transparent; border: 1px solid var(--green);
      color: var(--green); text-decoration: none;
      font-family: 'JetBrains Mono', monospace; font-size: .8rem;
      transition: all .2s; margin-top: 8px;
    }
    .win-btn:hover { background: rgba(0,229,160,.1); }
  </style>
</head>

// ═══════════════════════════════════════════════════════════════
// GAME STATE
// ═══════════════════════════════════════════════════════════════

let G = {};

function initState() {
  G = {
    user:       'ghost',
    host:       'breach',
    connected:  null,  // { ip, user, hostname, cwd }
    ftp:        null,  // { ip, hostname, cwd }
    discovered: new Set(),
    cracked:    {},

// ═══════════════════════════════════════════════════════════════
// OUTPUT ENGINE
// ═══════════════════════════════════════════════════════════════

const out   = document.getElementById('output');
const input = document.getElementById('cmd-input');

function print(text, cls='output') {
  const d = document.createElement('div');
  d.className = 'line ' + cls;
  d.textContent = text;
  out.appendChild(d);
  scrollBottom();
}

function printHTML(html, cls='output') {
  const d = document.createElement('div');
  d.className = 'line ' + cls;
  d.innerHTML = html;
  out.appendChild(d);
  scrollBottom();
}

function blank() { print(' ', 'blank'); }

function scrollBottom() {
  out.scrollTop = out.scrollHeight;
}

// Typewriter a single line
function typewrite(text, cls='output', speed=18) {
  return new Promise(resolve => {
    const d = document.createElement('div');
    d.className = 'line ' + cls;
    out.appendChild(d);
    let i = 0;
    const t = setInterval(() => {
      d.textContent += text[i++];
      scrollBottom();
      if (i >= text.length) { clearInterval(t); resolve(); }
    }, speed);
  });
}

// Print array of lines with delay between each
async function printLines(lines, delay=30) {
  for (const [text, cls] of lines) {
    if (text === null) { blank(); await sleep(delay); continue; }
    print(text, cls ?? 'output');
    await sleep(delay);
  }
}

// Animated progress bar
function progressBar(label, duration, cls='success') {
  return new Promise(resolve => {
    const d = document.createElement('div');
    d.className = 'line progress-line';
    out.appendChild(d);
    const BAR_WIDTH = 28;
    let pct = 0;
    const interval = duration / 100;
    const t = setInterval(() => {
      pct = Math.min(100, pct + 1 + Math.random() * 2);
      const filled = Math.floor((pct / 100) * BAR_WIDTH);
      const bar = '█'.repeat(filled) + '░'.repeat(BAR_WIDTH - filled);
      d.textContent = `${label} [${bar}] ${Math.floor(pct)}%`;
      d.className = 'line ' + (pct >= 100 ? cls : 'dim');
      scrollBottom();
      if (pct >= 100) { clearInterval(t); setTimeout(resolve, 200); }
    }, interval);
  });
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    document.getElementById('pl-path').textContent = G.ftp.cwd;

    document.getElementById('pl-user').textContent = G.connected.user;

    document.getElementById('pl-path').textContent = G.connected.cwd;
    return;
  }
  document.getElementById('pl-user').textContent = G.user;
  document.getElementById('pl-host').textContent = G.host;

// ═══════════════════════════════════════════════════════════════
// COMMAND ECHO
// ═══════════════════════════════════════════════════════════════

function echoCmd(cmd) {
  let prefix;
  if (G.ftp) {
    prefix = `ftp@${G.ftp.hostname}:${G.ftp.cwd}$ `;
  } else if (G.connected) {
    prefix = `${G.connected.user}@${G.connected.hostname}:${G.connected.cwd}$ `;
  } else {
    prefix = `${G.user}@${G.host}:~$ `;
  }
  print(prefix + cmd, 'cmd');
}

// ═══════════════════════════════════════════════════════════════
// COMMAND HANDLERS
// ═══════════════════════════════════════════════════════════════

async function handleCommand(raw) {
  const parts = raw.trim().split(/\s+/);
  const cmd   = parts[0].toLowerCase();
  const args  = parts.slice(1);

  echoCmd(raw);

  // ── FTP SESSION COMMANDS ─────────────────────────────────────
  if (G.ftp) {
    switch(cmd) {
      case 'ls':  ftpLs();   break;
      case 'dir': ftpLs();   break;
      case 'get': await ftpGet(args[0]); break;
      case 'cat': await ftpGet(args[0]); break;
      case 'exit':
      case 'quit':
      case 'bye':
        print('221 Goodbye.', 'dim');
        G.ftp = null;
        updatePrompt();
        break;
      case 'help':
        await printLines([
          ['FTP commands: ls, get <file>, exit', 'dim'],
        ]);
        break;
      default:
        print(`ftp: unknown command '${cmd}' — try: ls, get <file>, exit`, 'error');
    }
    return;
  }

  // ── CONNECTED SSH COMMANDS ───────────────────────────────────
  if (G.connected) {
    switch(cmd) {
      case 'ls':       sshLs(args[0]);        break;
      case 'cat':      await sshCat(args[0]);  break;
      case 'cd':       sshCd(args[0]);         break;
      case 'pwd':      print(sshAbsPath(G.connected.cwd), 'output'); break;
      case 'whoami':   print(G.connected.user, 'output');   break;
      case 'hostname': print(G.connected.hostname, 'output'); break;
      case 'uname':    print(`Linux ${G.connected.hostname} 5.15.0 #1 SMP x86_64 GNU/Linux`, 'dim'); break;
      case 'id':       print(`uid=1001(${G.connected.user}) gid=1001(${G.connected.user}) groups=1001(${G.connected.user})`, 'output'); break;
      case 'exit':
      case 'logout':
        print(`Connection to ${G.connected.ip} closed.`, 'dim');
        G.connected = null;
        updatePrompt();
        break;
      case 'clear':    out.innerHTML = ''; break;
      case 'help':     printHelp(); break;
      case 'history':  printHistory(); break;
      default:
        print(`bash: ${cmd}: command not found`, 'error');
        print(`hint: try ls, cat <file>, cd <dir>, exit`, 'dim');
    }
    return;
  }

  // ── TOP-LEVEL COMMANDS ───────────────────────────────────────
  switch(cmd) {
    case 'help': case '?':
      printHelp(); break;
    case 'clear':
      out.innerHTML = ''; break;
    case 'scan':
      await cmdScan(); break;
    case 'nmap':
      await cmdNmap(args[0], args); break;
    case 'ftp':
      await cmdFtp(args[0]); break;
    case 'ssh':
      await cmdSsh(args[0], args); break;
    case 'crack':
      await cmdCrack(args[0]); break;
    case 'whoami':
      print(G.user, 'output'); break;
    case 'history':
      printHistory(); break;
    case 'ping':
      await cmdPing(args[0]); break;
    case 'ifconfig': case 'ip':
      await printLines([
        ['eth0: flags=4163<UP,BROADCAST,RUNNING,MULTICAST> mtu 1500', 'dim'],
        ['      inet 192.168.10.99  netmask 255.255.255.0  broadcast 192.168.10.255', 'dim'],
        ['      ether 02:42:c0:a8:0a:63  txqueuelen 0', 'dim'],
      ]); break;
    case 'ls': case 'dir':
      print('bash: ls: No such file or directory (not connected to a server)', 'error'); break;
    case 'cat':
      print('bash: cat: must be connected to a server first', 'error'); break;
    default:
      print(`bash: ${cmd}: command not found`, 'error');
      print(`type 'help' for available commands`, 'dim');
  }
}

// ── HELP ─────────────────────────────────────────────────────
function printHelp() {
  printLines([
    ['', 'blank'],
    ['  AVAILABLE COMMANDS', 'success'],
    ['  ─────────────────────────────────────────────', 'dim'],
    ['  scan                  discover hosts on the network', 'output'],

    ['  ssh <user@ip>         connect via SSH', 'output'],
    ['  crack <hash>          attempt to crack a password hash', 'output'],
    ['  ping <ip>             check if host is reachable', 'output'],
    ['  ifconfig              show your network interface', 'output'],
    ['  whoami                current user', 'output'],
    ['  history               command history', 'output'],
    ['  clear                 clear terminal', 'output'],
    ['', 'blank'],
    ['  When connected via SSH:', 'dim'],
    ['  ls [dir]  cat <file>  cd <dir>  pwd  whoami  hostname  exit', 'dim'],
    ['', 'blank'],
    ['  When in FTP session:', 'dim'],
    ['  ls  get <file>  exit', 'dim'],
    ['', 'blank'],
  ]);
}

// ── HISTORY ──────────────────────────────────────────────────
function printHistory() {
  G.history.forEach((h, i) => print(`  ${String(i+1).padStart(3)}  ${h}`, 'dim'));
}

// ── PING ─────────────────────────────────────────────────────
async function cmdPing(ip) {
  if (!ip) { print('usage: ping <ip>', 'error'); return; }
  const known = NETWORK[ip];
  if (!known || (known.locked && !G.discovered.has(ip))) {
    print(`ping: connect: No route to host`, 'error'); return;
  }
  for (let i = 1; i <= 4; i++) {
    print(`64 bytes from ${ip}: icmp_seq=${i} ttl=64 time=${(Math.random()*2+0.5).toFixed(2)} ms`, 'dim');
    await sleep(300);
  }
  print(`--- ${ip} ping statistics ---`, 'dim');
  print(`4 packets transmitted, 4 received, 0% packet loss`, 'dim');
}

// ── SCAN ─────────────────────────────────────────────────────
async function cmdScan() {
  print('', 'blank');
  print('Starting ARP scan on 192.168.10.0/24 ...', 'dim');
  await sleep(400);
  await progressBar('scanning subnet', 1800, 'dim');
  blank();

  const hosts = G.phase >= 1
    ? [['192.168.10.47', 'dev-workstation', 'UP'], ['10.10.0.12', 'prod-auth-01', 'UP']]
    : [['192.168.10.47', 'dev-workstation', 'UP']];

  await printLines([
    ['  IP               HOSTNAME            STATUS', 'success'],
    ['  ──────────────────────────────────────────', 'dim'],
  ]);
  for (const [ip, hostname, status] of hosts) {
    G.discovered.add(ip);
    await sleep(200);
    print(`  ${ip.padEnd(17)}{hostname.padEnd(20)}${status}`, 'output');
  }
  blank();
  print(`${hosts.length} host(s) up. Use 'nmap <ip>' to probe a target.`, 'dim');
  blank();

function sshLs(dir) {
  const host = NETWORK[G.connected.ip];

  const fs = host.filesystem[target];
  if (!fs) { print(`ls: cannot access '${dir}': No such file or directory`, 'error'); return; }

  const items = [
    ...fs.dirs.map(d => d + '/'),
    ...fs.files,
  ];
  // print in columns
  const cols = 4;
  for (let i = 0; i < items.length; i += cols) {
    const row = items.slice(i, i + cols).map(s => s.padEnd(22)).join('');
    print('  ' + row, items[i].endsWith('/') ? 'blue' : 'output');
  }
}

// ── SSH CD ───────────────────────────────────────────────────
function sshCd(dir) {
  if (!dir || dir === '~') { G.connected.cwd = '~'; updatePrompt(); return; }
  const target = resolvePath(G.connected.cwd, dir);
  const host = NETWORK[G.connected.ip];
  if (!host.filesystem[target]) {
    print(`bash: cd: ${dir}: No such file or directory`, 'error');
    return;
  }
  G.connected.cwd = target;
  updatePrompt();
}

function resolvePath(cwd, rel) {
  if (rel.startsWith('/')) return rel;
  if (rel === '..') {
    const parts = cwd.split('/');
    parts.pop();
    return parts.join('/') || '~';
  }
  return cwd === '~' ? `~/${rel}` : `${cwd}/${rel}`;
}

function sshAbsPath(cwd) {
  if (cwd === '~') return `/home/${G.connected.user}`;
  return cwd.replace('~', `/home/${G.connected.user}`);
}

// ── CRACK ────────────────────────────────────────────────────
async function cmdCrack(hash) {
  if (!hash) { print('usage: crack <hash>', 'error'); return; }

  // Find matching host
  let found = null;
  for (const ip of Object.keys(NETWORK)) {
    const h = NETWORK[ip];
    if (h.crack_hash && h.crack_hash[hash]) {
      found = h.crack_hash[hash];
    }
  }
  if (!found && !hash.startsWith('$2y$10$xK9')) {
    print(`crack: unrecognised hash format`, 'error');
    return;
  }

  blank();
  print(`[*] Hash type detected: bcrypt ($2y$10$)`, 'dim');
  print(`[*] Loading wordlist: rockyou.txt (14,344,391 entries)`, 'dim');
  print(`[*] Starting attack mode: dictionary + rules`, 'dim');

  await sleep(400);

  await progressBar('cracking hash ', 3200, 'warn');
  await sleep(300);

  await progressBar('applying rules ', 1200, 'warn');

  await sleep(400);
  print(`[+] CRACKED: ${hash}`, 'success');
  print(`[+] Password: S3cur!ty#2024`, 'success');
  blank();
  G.cracked[hash] = 'S3cur!ty#2024';

    print('⚡ Password cracked! Now: ssh svc_auth@10.10.0.12', 'success');
    setObjective('ssh svc_auth@10.10.0.12 (password: S3cur!ty#2024)');

    if (NETWORK['10.10.0.12']) {
      NETWORK['10.10.0.12'].locked = false;
      G.discovered.add('10.10.0.12');
    }
  }
}

// INPUT HANDLING
// ═══════════════════════════════════════════════════════════════

input.addEventListener('keydown', async e => {
  if (e.key === 'Enter') {
    const raw = input.value.trim();
    input.value = '';
    if (!raw) return;
    if (G.busy) return;

    G.history.unshift(raw);
    G.histIdx = -1;

    G.busy = true;
    input.disabled = true;
    try {
      await handleCommand(raw);
    } finally {
      G.busy = false;
      input.disabled = false;
      input.focus();
    }
    return;
  }

  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (G.histIdx < G.history.length - 1) {
      G.histIdx++;
      input.value = G.history[G.histIdx];
    }
  }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (G.histIdx > 0) { G.histIdx--; input.value = G.history[G.histIdx]; }
    else { G.histIdx = -1; input.value = ''; }
  }

  // Tab completion
  if (e.key === 'Tab') {
    e.preventDefault();
    const CMDS = ['help','clear','scan','nmap','ftp','ssh','crack','ping','ifconfig','whoami','history'];
    const v = input.value;
    const match = CMDS.find(c => c.startsWith(v) && c !== v);
    if (match) input.value = match + ' ';
  }
});
